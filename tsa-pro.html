<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

<style>
/* ============================================================
   TSA Pro -- Complete Stylesheet
   Dark theme (default) + Light theme toggle
   ============================================================ */

/* --- CSS Custom Properties (Dark Theme) --- */
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --card: #1e1e38;
  --border: #2a2a4a;
  --text: #e0e0e8;
  --text2: #a0a0b8;
  --accent: #00d4ff;
  --accent2: #7c4dff;
  --success: #00e676;
  --warning: #ffc107;
  --danger: #ff5252;
  --danger-bg: rgba(255, 82, 82, 0.1);
  --success-bg: rgba(0, 230, 118, 0.1);
  --warning-bg: rgba(255, 193, 7, 0.1);
  --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
  --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --transition: 0.2s ease;
}

/* --- Light Theme --- */
[data-theme="light"] {
  --bg: #f4f6f9;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --card: #ffffff;
  --border: #d0d5dd;
  --text: #1a1a2e;
  --text2: #555570;
  --accent: #0077cc;
  --accent2: #5c2dbf;
  --success: #00a854;
  --warning: #d4a017;
  --danger: #d32f2f;
  --danger-bg: rgba(211, 47, 47, 0.08);
  --success-bg: rgba(0, 168, 84, 0.08);
  --warning-bg: rgba(212, 160, 23, 0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
}

/* --- Reset & Base --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 15px;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* --- Screen-reader only --- */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* --- Header --- */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.app-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.app-header h1 span {
  color: var(--text2);
  font-weight: 400;
  font-size: 0.9rem;
  margin-left: 0.75rem;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

/* --- Theme Toggle --- */
.theme-toggle {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0.35rem 0.75rem;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  transition: background var(--transition), border-color var(--transition);
}
.theme-toggle:hover {
  border-color: var(--accent);
}

/* --- Tab Navigation --- */
.tab-nav {
  display: flex;
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 2rem;
  gap: 0;
  overflow-x: auto;
}

.tab-btn {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text2);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  font-weight: 500;
  padding: 0.85rem 1.5rem;
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--transition), border-color var(--transition);
  position: relative;
}
.tab-btn:hover {
  color: var(--text);
}
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.tab-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  border-radius: 4px 4px 0 0;
}

/* --- Tab Panels --- */
.tab-panel {
  display: none;
  padding: 2rem;
  max-width: 1400px;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}
.tab-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Cards --- */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-sm);
}

.card-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

/* --- Hero / Stat Cards --- */
.hero-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.hero-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  text-align: center;
}
.hero-card .hero-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text2);
  margin-bottom: 0.35rem;
}
.hero-card .hero-value {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-mono);
}
.hero-card .hero-sub {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 0.2rem;
}

/* --- Forms & Inputs --- */
label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 0.3rem;
}

input[type="text"],
input[type="number"],
select,
textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.9rem;
  padding: 0.55rem 0.75rem;
  width: 100%;
  transition: border-color var(--transition);
}
input[type="number"] {
  font-family: var(--font-mono);
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.15);
}
textarea {
  font-family: var(--font-mono);
  resize: vertical;
  min-height: 120px;
}

/* --- Radio buttons (outcome type) --- */
.radio-group {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1rem;
}
.radio-group label {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  cursor: pointer;
  color: var(--text);
  font-weight: 500;
}
.radio-group input[type="radio"] {
  accent-color: var(--accent);
  width: 16px;
  height: 16px;
}

/* --- Inline form groups --- */
.form-row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.form-group {
  flex: 1;
  min-width: 140px;
}
.form-group-narrow {
  flex: 0 0 160px;
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.6rem 1.2rem;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-family: var(--font-sans);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}
.btn-primary:hover {
  filter: brightness(1.15);
  box-shadow: 0 0 12px rgba(0,212,255,0.3);
}

.btn-secondary {
  background: transparent;
  color: var(--accent);
  border-color: var(--accent);
}
.btn-secondary:hover {
  background: rgba(0,212,255,0.1);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border-color: var(--danger);
}
.btn-danger:hover {
  background: var(--danger-bg);
}

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border-color: var(--border);
}
.btn-ghost:hover {
  background: var(--surface2);
  color: var(--text);
}

.btn-sm {
  padding: 0.35rem 0.75rem;
  font-size: 0.8rem;
}

/* --- Tables --- */
.data-table-container {
  overflow-x: auto;
  margin-bottom: 1rem;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
.data-table th {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 0.55rem 0.75rem;
  text-align: left;
  font-weight: 600;
  color: var(--text2);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.data-table td {
  border: 1px solid var(--border);
  padding: 0.45rem 0.6rem;
}
.data-table td input {
  border: none;
  background: transparent;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.88rem;
  padding: 0.2rem;
  width: 100%;
}
.data-table td input:focus {
  outline: none;
  box-shadow: inset 0 -2px 0 var(--accent);
}
.data-table tr:hover {
  background: rgba(0,212,255,0.03);
}
.data-table .row-num {
  color: var(--text2);
  font-size: 0.75rem;
  text-align: center;
  width: 30px;
  padding: 0.45rem 0.3rem;
}
.data-table .row-actions {
  text-align: center;
  width: 40px;
}
.data-table .row-actions button {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1rem;
  padding: 0.2rem;
  opacity: 0.6;
  transition: opacity var(--transition);
}
.data-table .row-actions button:hover {
  opacity: 1;
}
.data-table tfoot td {
  background: var(--surface2);
  font-weight: 600;
  color: var(--text2);
}

/* --- Verdict Box --- */
.verdict-box {
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin: 1.5rem 0;
  text-align: center;
}
.verdict-box.benefit {
  background: var(--success-bg);
  border: 2px solid var(--success);
}
.verdict-box.harm {
  background: var(--danger-bg);
  border: 2px solid var(--danger);
}
.verdict-box.futility {
  background: var(--warning-bg);
  border: 2px solid var(--warning);
}
.verdict-box.inconclusive {
  background: rgba(160,160,184,0.08);
  border: 2px solid var(--text2);
}
.verdict-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.verdict-text {
  font-size: 0.95rem;
  color: var(--text2);
  max-width: 700px;
  margin: 0 auto;
}

/* --- Results Layout (Tab 3) --- */
.results-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 1.5rem;
}
@media (max-width: 900px) {
  .results-layout { grid-template-columns: 1fr; }
}

.ris-panel .ris-item {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.ris-panel .ris-item:last-child {
  border-bottom: none;
}
.ris-panel .ris-label {
  color: var(--text2);
}
.ris-panel .ris-value {
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--text);
}

/* --- Canvas containers --- */
.canvas-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1rem;
  position: relative;
}
.canvas-wrap canvas {
  display: block;
  width: 100%;
  height: auto;
}

/* --- Export buttons row --- */
.export-row {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

/* --- Report text area --- */
.report-text {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  font-size: 0.92rem;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  min-height: 200px;
  font-family: var(--font-sans);
}

/* --- Settings panel layout --- */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
@media (max-width: 768px) {
  .settings-grid { grid-template-columns: 1fr; }
}

/* --- Notification toast --- */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 0.75rem 1.25rem;
  font-size: 0.88rem;
  color: var(--text);
  box-shadow: var(--shadow);
  z-index: 999;
  animation: slideUp 0.3s ease, fadeOut 0.3s ease 2.7s;
  pointer-events: none;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* --- Dropdown (examples) --- */
.dropdown-wrap {
  position: relative;
  display: inline-block;
}
.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  min-width: 320px;
  z-index: 50;
  padding: 0.5rem 0;
  margin-top: 0.25rem;
}
.dropdown-menu.open {
  display: block;
}
.dropdown-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.88rem;
  padding: 0.6rem 1rem;
  cursor: pointer;
  transition: background var(--transition);
}
.dropdown-item:hover {
  background: var(--surface2);
}
.dropdown-item .dropdown-item-sub {
  font-size: 0.78rem;
  color: var(--text2);
  display: block;
  margin-top: 0.15rem;
}

/* --- Print Styles --- */
@media print {
  body { background: #fff; color: #000; }
  .app-header, .tab-nav, .btn, .theme-toggle,
  .tab-panel:not(.active), .toast { display: none !important; }
  .tab-panel { display: block !important; padding: 0; max-width: none; }
  .card { border: 1px solid #ccc; box-shadow: none; break-inside: avoid; }
  .canvas-wrap { border: 1px solid #ccc; }
  .verdict-box { border-width: 1px; }
}

/* --- Scrollbar (dark) --- */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>

<script>
'use strict';

// === TAB NAVIGATION ===
(function initTabs() {
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabPanels = document.querySelectorAll('.tab-panel');

  function switchTab(tabName) {
    tabBtns.forEach(btn => {
      const isActive = btn.dataset.tab === tabName;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    tabPanels.forEach(panel => {
      panel.classList.toggle('active', panel.id === 'panel-' + tabName);
    });
  }

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    btn.addEventListener('keydown', (e) => {
      const tabs = Array.from(tabBtns);
      const idx = tabs.indexOf(btn);
      let newIdx = -1;
      if (e.key === 'ArrowRight') newIdx = (idx + 1) % tabs.length;
      if (e.key === 'ArrowLeft') newIdx = (idx - 1 + tabs.length) % tabs.length;
      if (newIdx >= 0) {
        e.preventDefault();
        tabs[newIdx].focus();
        switchTab(tabs[newIdx].dataset.tab);
      }
    });
  });

  // Expose for programmatic use
  window.switchTab = switchTab;
})();

// === THEME TOGGLE ===
(function initTheme() {
  const html = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');

  // Restore saved preference
  const saved = localStorage.getItem('tsa-theme');
  if (saved) {
    html.setAttribute('data-theme', saved);
  }

  function updateUI() {
    const isDark = html.getAttribute('data-theme') === 'dark';
    icon.textContent = isDark ? '\u263E' : '\u2600';
    label.textContent = isDark ? 'Dark' : 'Light';
  }
  updateUI();

  toggle.addEventListener('click', () => {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('tsa-theme', next);
    updateUI();
  });
})();

// === TOAST NOTIFICATIONS ===
function showToast(message) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
